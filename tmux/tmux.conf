# ─────────────────────────────────────────────
# Tmux Config — One Dark Vibrant
# ─────────────────────────────────────────────

# ── General ───────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5

# ── One Dark Vibrant Palette ──────────────────
BG="#282c34"
FG="#abb2bf"
COMMENT="#545862"
RED="#e06c75"
GREEN="#98c379"
YELLOW="#e5c07b"
BLUE="#61afef"
PURPLE="#c678dd"
CYAN="#56b6c2"
BRIGHT_FG="#d7dae0"

# ── Keybindings ───────────────────────────────
# Splits (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style, no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resizing (prefix + shift vim keys)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind Tab next-window
bind BTab previous-window

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Cheat sheet
bind ? display-popup -w 60 -h 20 -E "\
printf '\n\
  ── Tmux Cheat Sheet ──\n\
\n\
  PREFIX = Ctrl-a\n\
\n\
  Splits:    | vertical   - horizontal\n\
  Panes:     C-h/j/k/l   (no prefix)\n\
  Resize:    H/J/K/L      (with prefix)\n\
  Windows:   Tab / Shift-Tab\n\
  New win:   c\n\
  Reload:    r\n\
  Kill pane: x\n\
\n\
  Save:      C-s  (resurrect)\n\
  Restore:   C-r  (resurrect)\n\
\n\
  Press q to close\n\
'; read -n1"

# ── Status Bar ────────────────────────────────
set -g status-position top
set -g status-style "bg=$BG,fg=$FG"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[fg=$BG,bg=$BLUE,bold]  #S #[fg=$BLUE,bg=$BG,nobold]"

# Window list
set -g status-justify left
setw -g window-status-format "#[fg=$COMMENT,bg=$BG] #I:#W "
setw -g window-status-current-format "#[fg=$BG,bg=$GREEN]#[fg=$BG,bg=$GREEN,bold] #I:#W #[fg=$GREEN,bg=$BG]"
setw -g window-status-separator ""

# Right: directory, time, date
set -g status-right "#[fg=$PURPLE,bg=$BG]#[fg=$BG,bg=$PURPLE] #{b:pane_current_path} #[fg=$YELLOW,bg=$PURPLE]#[fg=$BG,bg=$YELLOW] %H:%M #[fg=$CYAN,bg=$YELLOW]#[fg=$BG,bg=$CYAN] %b %d "

# Pane borders
set -g pane-border-style "fg=$COMMENT"
set -g pane-active-border-style "fg=$BLUE"

# Message style
set -g message-style "bg=$BLUE,fg=$BG,bold"
set -g message-command-style "bg=$YELLOW,fg=$BG"

# ── Plugins (TPM) ────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
